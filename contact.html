     <section id="contact" class="text-center">
  <div class="container">

    <!-- Section heading -->
    <h2 class="section-header">Want to message me?</h2>
       <p class="section-subtitle">I’d love to hear from you</p>

   
     
      
    <!-- Name -->
    <div class="form-group text-center">
      <label for="name">Name</label>
      <div class="row">
        <div class="col-xs-12 col-sm-8 col-md-6 col-lg-4
                    col-sm-offset-2 col-md-offset-3 col-lg-offset-4">
          <input
            type="text"
            id="name"
            class="form-control input-lg"
            placeholder="Your name"
          >
        </div>
      </div>
    </div>

    <!-- Email -->
    <div class="form-group text-center">
      <label for="email">Email</label>
      <div class="row">
        <div class="col-xs-12 col-sm-8 col-md-6 col-lg-4
                    col-sm-offset-2 col-md-offset-3 col-lg-offset-4">
          <input
            type="email"
            id="email"
            class="form-control input-lg"
            placeholder="your@email.com"
          >
        </div>
      </div>
    </div>

    <!-- Message + button -->
   <div class="form-group text-center">
  <label for="message">Message</label>

  <div class="row">
    <div class="col-xs-12 col-sm-8 col-md-6 col-lg-4
                col-sm-offset-2 col-md-offset-3 col-lg-offset-4">

      <div class="message-row">
        <input
          type="text"
          id="message"
          class="form-control input-lg message-input"
          placeholder="Send message here..."
        >
        <button class="btn btn-primary btn-lg message-btn">
          Submit
        </button>
      </div>

        </div>
      </div>
    </div>

  </div>
</section>
