<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- The above 3 meta tags *must* come first in the head; any other head content must come *after* these tags -->
    <title>Bootstrap Modal</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="bootstrap/css/bootstrap.min.css" >
    <link rel="stylesheet" href="styles.css" >

    <!-- HTML5 shim and Respond.js for IE8 support of HTML5 elements and media queries -->
    <!-- WARNING: Respond.js doesn't work if you view the page via file:// -->
    <!--[if lt IE 9]>
      <script src="https://cdn.jsdelivr.net/npm/html5shiv@3.7.3/dist/html5shiv.min.js"></script>
      <script src="https://cdn.jsdelivr.net/npm/respond.js@1.4.2/dest/respond.min.js"></script>
    <![endif]-->
  </head>
  <body>
   
      <div class="container">
       <div class="page-header">
          <h1>Bootstrap Modal window</h1>
          <p class="lead"> Easy popup window without needing to code css or JS!</p>
                
           </div>
          <button type="button" class="btn btn-danger btn-lg" data-toggle="modal" data-target="#updateCreditCard"> Update credit card</button>
          
          
          <!--Modal-->
          <form class="modal fade" id="upadateCreditCard">
          
          
              <div class="modal-dialog modal-lg"> 
              
                  
                  <div class="modal-content">
                  
                      <div class="modal-header">
                      
                          <button type="button" class="close" data-dismiss="modal"><span>&times;</span></button>
                          <h3 class="modal-title"><span class="glyphicon glyphicon-credit-card"></span>Update credit card</h3>
                      </div>
                      
                      <div class="modal-body">
                    
                              <div class="form-group">
                              
                                  <label>Name on card</label>
                                  <input type="text" placeholder=" name on card" class="form-control">
                              </div>
                          
                              <div class="form-group">
                              
                                  <label>Credit card number</label>
                                  <input type="text" placeholder="Credit card number" class="form-control">
                              </div>
                    
                      </div>
                      
                      <div class="modal-footer">
                          <button type="button" class="btn btn-default" data-dismiss="modal">Cancel</button>
                          <button type="submit" class="btn btn-primary">Save changes</button>
                      
                      </div>
                  </div>
              
              </div>
          
          
          
          </form>
           
        </div><!--container-->
      
      

    <!-- jQuery (necessary for Bootstrap's JavaScript plugins) -->
    <script src="https://code.jquery.com/jquery-1.12.4.min.js" integrity="sha384-nvAa0+6Qg9clwYCGGPpDQLVpLNn0fRaROjHqs13t4Ggj3Ez50XnGQqc/r8MhnRDZ" crossorigin="anonymous"></script>
    <!-- Include all compiled plugins (below), or include individual files as needed -->
    <script src="bootstrap/js/bootstrap.min.js" integrity="sha384-aJ21OjlMXNL5UyIl/XNwTMqvzeRMZH2w8c5cRVpzpU8Y5bApTppSuUkhZXN0VxHd" crossorigin="anonymous"></script>
  </body>
</html>
