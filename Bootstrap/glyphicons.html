<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Bootstrap Glyphicons</title>

    <!-- Bootstrap -->
    <link href="bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">

    <!-- HTML5 shim and Respond.js for IE8 support of HTML5 elements and media queries -->
    <!--[if lt IE 9]>
        <script src="https://oss.maxcdn.com/html5shiv/3.7.2/html5shiv.min.js"></script>
        <script src="https://oss.maxcdn.com/respond/1.4.2/respond.min.js"></script>
    <![endif]-->

</head>
<body>

    <div class="container">
        
        <div class="page-header">
            <h1>Bootstrap Glyphicons</h1>
            <p class="lead">Icons that are actual, real-life fonts! This means no Photoshopping required :)</p>
        </div><!-- page-header -->
        
       
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-arrow-through-heart-fill" viewBox="0 0 16 16">
  <path fill-rule="evenodd" d="M2.854 15.854A.5.5 0 0 1 2 15.5V14H.5a.5.5 0 0 1-.354-.854l1.5-1.5A.5.5 0 0 1 2 11.5h1.793l3.103-3.104a.5.5 0 1 1 .708.708L4.5 12.207V14a.5.5 0 0 1-.146.354zM16 3.5a.5.5 0 0 1-.854.354L14 2.707l-1.006 1.006c.236.248.44.531.6.845.562 1.096.585 2.517-.213 4.092-.793 1.563-2.395 3.288-5.105 5.08L8 13.912l-.276-.182A24 24 0 0 1 5.8 12.323L8.31 9.81a1.5 1.5 0 0 0-2.122-2.122L3.657 10.22a9 9 0 0 1-1.039-1.57c-.798-1.576-.775-2.997-.213-4.093C3.426 2.565 6.18 1.809 8 3.233c1.25-.98 2.944-.928 4.212-.152L13.292 2 12.147.854A.5.5 0 0 1 12.5 0h3a.5.5 0 0 1 .5.5z"/>
</svg>
        <p><span class="glyphicon glyphicon-circle-arrow-right"></span></p>
        
        <h3><span class="glyphicon glyphicon-music"></span> An icon in a header!</h3>
        
        <p><span class="glyphicon glyphicon-trash"></span> There's an icon for just about anything you can think of!</p>
        
        <p>You can link an icon like so: <a href="index.html"><span class="glyphicon glyphicon-cog"></span></a></p>

        
        <button type="button" class="btn btn-default btn-lg btn-info">
        <span class="glyphicon glyphicon-star" aria-hidden="true"></span> A button with an icon
        </button>
        
        <br><br>
        
        <div class="alert alert-warning">
            <span class="glyphicon glyphicon-exclamation-sign"></span>
            You may use icons in alert messages, too!
        </div>
        
        <br>
        
        <h4>Use icons for User Interface design</h4>
        
        <div class="btn-toolbar">
            <div class="btn-group">
                <button type="button" class="btn btn-default"><span class="glyphicon glyphicon-play"></span></button>
                <button type="button" class="btn btn-default"><span class="glyphicon glyphicon-pause"></span></button>
                <button type="button" class="btn btn-default"><span class="glyphicon glyphicon-stop"></span></button>
            </div>
        </div>
        
        
        <hr>
    </div><!-- container -->


    <!-- jQuery (necessary for Bootstrap's JavaScript plugins) -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.3/jquery.min.js"></script>
    <!-- Include all compiled plugins (below), or include individual files as needed -->
    <script src="bootstrap/js/bootstrap.min.js"></script>
</body>
</html>
